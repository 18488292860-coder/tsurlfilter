---
version: 2
plan:
  project-key: AJL
  key: DNRCONVERTERBUILD
  name: DNR Converter - build
stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex

            # Fix mixed logs
            exec 2>&1

            # TODO: Implement build (AG-45668)
            echo "DNR Converter build not yet implemented"

            # Create empty placeholder artifact so downstream plans that
            # reference dnr-converter.tgz do not fail.
            mkdir -p output/artifacts
            touch output/artifacts/dnr-converter.tgz
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/dnr-converter.tgz"
  artifacts:
    - name: dnr-converter.tgz
      location: output/artifacts
      pattern: dnr-converter.tgz
      shared: true
      required: true
  requirements:
    - extension: 'true'

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: 'true'

labels: []

other:
  concurrent-build-plugin: system-default
