---
version: 2
plan:
  project-key: AJL
  key: TSWEBEXTENSIONUPDCOMPANIESDB
  name: tswebextension - update companiesdb
stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: TSWEBEXTUPDCOMPANIESDB
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex

            # Fix mixed logs
            exec 2>&1

            BRANCH="${bamboo.planRepository.branchName}"

            if [ "$BRANCH" != "master" ]; then
              echo "load companiesdb is not supported on branch ${BRANCH}."
              exit 1
            fi

            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --target update-companiesdb-output \
              --output type=local,dest=output \
              .

            EXIT_CODE=$(cat output/exit-code.txt 2>/dev/null || echo 1)

            if [ "$EXIT_CODE" -eq 0 ] && [ -d output/modified ]; then
              cp -R output/modified/. .
            else
              echo "No meaningful changes detected, skipping commit"
              exit 1
            fi
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.commit
        configuration:
          commitMessage: 'skipci: update companiesdb data'
          selectedRepository: defaultRepository
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements:
    - extension: 'true'

# run release build at 11:00 every Tuesday (after companiesdb update)
triggers:
  - cron:
      expression: 0 0 11 ? * TUE

branches:
  create: manually
  delete: never
  link-to-jira: 'true'

labels: [ ]

other:
  concurrent-build-plugin: system-default
