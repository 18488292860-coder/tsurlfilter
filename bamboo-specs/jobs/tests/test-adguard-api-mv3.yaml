key: TESTADGUARDAPIMV3
other:
  clean-working-dir: true
tasks:
  - checkout:
      force-clean-build: true
  - script:
      interpreter: SHELL
      scripts:
        - |-
          set -ex

          # Fix mixed logs
          exec 2>&1

          export DOCKER_BUILDKIT=1

          . ./bamboo-specs/scripts/helpers.sh

          if [ "$branch" != "master" ] && ! is_root_affected && ! is_project_affected "@adguard/api-mv3"; then
            echo "No changes in @adguard/api-mv3, skipping tests"
            mkdir -p output && echo 0 > output/exit-code.txt
            skip_tests output/tests-reports/adguard-api-mv3.xml
            exit 0
          fi

          docker build \
            --file Dockerfile \
            --progress plain \
            --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
            --target test-adguard-api-mv3-output \
            --output type=local,dest=output \
            .
  - script:
      interpreter: SHELL
      scripts:
        - |-
          if [ -f output/exit-code.txt ]; then
            exit $(cat output/exit-code.txt)
          fi
          echo "output/exit-code.txt not found"
          exit 1
final-tasks:
  - test-parser:
      type: junit
      test-results: 'output/tests-reports/adguard-api-mv3.xml'
  - script:
      interpreter: SHELL
      scripts:
        - "./bamboo-specs/scripts/cleanup.sh"
requirements:
  - extension: 'true'
